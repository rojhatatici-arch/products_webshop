<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasse | Mein Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mein Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Produkte</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Warenkorb <span id="cart-count" class="badge bg-light text-dark">0</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1>Kasse</h1>
        <div id="checkout-content"></div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">&copy; 2026 Mein Shop</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const products = await loadProducts();
            const cart = getCart();
            const container = document.getElementById('checkout-content');

            if (Object.keys(cart).length === 0) {
                container.innerHTML = '<p>Ihr Warenkorb ist leer. <a href="index.html">Weiter einkaufen</a></p>';
                return;
            }

            // Bestellübersicht berechnen
            let items = [];
            let total = 0;
            for (const [id, qty] of Object.entries(cart)) {
                const product = products.find(p => p.id == id);
                if (!product) continue;
                const subtotal = product.price * qty;
                total += subtotal;
                items.push({
                    id, qty,
                    title: product.title,
                    price: product.price,
                    subtotal
                });
            }

            // HIER STEHT IHRE FORMSPREE-URL:
            const formspreeEndpoint = 'https://formspree.io/f/xgonnyvo';

            let html = `
                <form id="order-form" action="${formspreeEndpoint}" method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <h3>Rechnungsadresse</h3>
                            <div class="mb-3">
                                <label for="name" class="form-label">Name *</label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">E-Mail *</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="address" class="form-label">Adresse *</label>
                                <input type="text" class="form-control" id="address" name="address" required>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="zip" class="form-label">PLZ *</label>
                                    <input type="text" class="form-control" id="zip" name="zip" required>
                                </div>
                                <div class="col-md-8 mb-3">
                                    <label for="city" class="form-label">Ort *</label>
                                    <input type="text" class="form-control" id="city" name="city" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h3>Ihre Bestellung</h3>
                            <table class="table">
                                ${items.map(item => `
                                    <tr>
                                        <td>${item.qty}x ${item.title}</td>
                                        <td class="text-end">CHF ${item.subtotal.toFixed(2)}</td>
                                    </tr>
                                `).join('')}
                                <tr>
                                    <th>Gesamt</th>
                                    <th class="text-end">CHF ${total.toFixed(2)}</th>
                                </tr>
                            </table>
                        </div>
                    </div>

                    <!-- Versteckte Felder für Formspree, damit die E-Mail aussagekräftig ist -->
                    <input type="hidden" name="_subject" value="Neue Bestellung">
                    <input type="hidden" name="_format" value="plain">
                    <input type="hidden" name="order_details" value='${JSON.stringify(items)}'>
                    <input type="hidden" name="total" value="${total}">

                    <button type="submit" class="btn btn-primary">Bestellung absenden</button>
                </form>
            `;
            container.innerHTML = html;

            document.getElementById('order-form').addEventListener('submit', (e) => {
                // Bestellung im Session-Storage speichern (für die Bestätigungsseite)
                sessionStorage.setItem('lastOrder', JSON.stringify({
                    items, total,
                    customer: {
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value
                    }
                }));
                // Warenkorb leeren
                localStorage.removeItem('cart');
                // Formular wird ganz normal an Formspree gesendet
            });
        });
    </script>
</body>
</html>
