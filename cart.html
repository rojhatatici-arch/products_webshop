<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb | Mein Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mein Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Produkte</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html">Warenkorb <span id="cart-count" class="badge bg-light text-dark">0</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1>Warenkorb</h1>
        <div id="cart-content"></div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">&copy; 2026 Mein Shop</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const products = await loadProducts();
            const cart = getCart();
            const container = document.getElementById('cart-content');

            function renderCart() {
                if (Object.keys(cart).length === 0) {
                    container.innerHTML = '<p>Ihr Warenkorb ist leer. <a href="index.html">Weiter einkaufen</a></p>';
                    return;
                }

                let html = '<form id="cart-form"><table class="table"><thead><tr><th>Produkt</th><th>Preis</th><th>Anzahl</th><th>Total</th><th></th></tr></thead><tbody>';
                let total = 0;
                for (const [id, qty] of Object.entries(cart)) {
                    const product = products.find(p => p.id == id);
                    if (!product) continue;
                    const subtotal = product.price * qty;
                    total += subtotal;
                    html += `
                        <tr>
                            <td>${product.title}</td>
                            <td>CHF ${product.price.toFixed(2)}</td>
                            <td><input type="number" name="qty[${id}]" value="${qty}" min="0" class="form-control" style="width:80px;"></td>
                            <td>CHF ${subtotal.toFixed(2)}</td>
                            <td><button type="button" class="btn btn-danger btn-sm remove-item" data-id="${id}">Entfernen</button></td>
                        </tr>
                    `;
                }
                html += `</tbody><tfoot><tr><th colspan="3" class="text-end">Gesamt:</th><th>CHF ${total.toFixed(2)}</th><th></th></tr></tfoot></table>`;
                html += '<button type="submit" class="btn btn-secondary">Aktualisieren</button> ';
                html += '<a href="checkout.html" class="btn btn-success">Zur Kasse</a></form>';
                container.innerHTML = html;

                // Update-Button
                document.getElementById('cart-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    for (const [name, value] of formData.entries()) {
                        if (name.startsWith('qty[')) {
                            const id = name.match(/\d+/)[0];
                            const qty = parseInt(value);
                            if (qty <= 0) {
                                delete cart[id];
                            } else {
                                cart[id] = qty;
                            }
                        }
                    }
                    saveCart(cart);
                    renderCart();
                    document.getElementById('cart-count').textContent = getCartCount();
                });

                // Entfernen-Buttons
                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.id;
                        delete cart[id];
                        saveCart(cart);
                        renderCart();
                        document.getElementById('cart-count').textContent = getCartCount();
                    });
                });
            }

            renderCart();
            document.getElementById('cart-count').textContent = getCartCount();
        });
    </script>
</body>
</html>
