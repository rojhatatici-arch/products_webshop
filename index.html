<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkte | Mein Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Mein Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Produkte</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Warenkorb <span id="cart-count" class="badge bg-light text-dark">0</span></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1>Unsere Produkte</h1>
        <div class="row" id="product-list"></div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <div class="container">&copy; 2026 Mein Shop</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const products = await loadProducts();
            const container = document.getElementById('product-list');
            products.forEach(product => {
                const col = document.createElement('div');
                col.className = 'col-md-4 mb-4';
                col.innerHTML = `
                    <div class="card h-100">
                        <img src="${product.image}" class="card-img-top" alt="${product.title}">
                        <div class="card-body">
                            <h5 class="card-title">${product.title}</h5>
                            <p class="card-text">${product.description.replace(/\n/g, '<br>')}</p>
                            <p class="fw-bold">CHF ${product.price.toFixed(2)}</p>
                            <button class="btn btn-primary add-to-cart" data-id="${product.id}">In den Warenkorb</button>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });

            // Warenkorb-Zähler aktualisieren
            document.getElementById('cart-count').textContent = getCartCount();

            // Add-to-cart Events
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    const cart = getCart();
                    cart[id] = (cart[id] || 0) + 1;
                    saveCart(cart);
                    document.getElementById('cart-count').textContent = getCartCount();
                    alert('Produkt wurde in den Warenkorb gelegt.');
                });
            });
        });
    </script>
</body>
</html>
